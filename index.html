<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZipGuard Bluetooth Control</title>

    <link rel="stylesheet" href="src/style.css">
</head>

<body>
    <header>

    <h1>ZipGuard Controller</h1>

    <span id="status" class="status disconnected">
        Disconnected
    </span>

    </header>


    <section class="connection-panel">

        <h2>Bluetooth Connection</h2>

        <button id="bleConnectBtn" class="connect-btn">
            Scan & Connect to ESP32
        </button>

    </section>


    <section class="controls">

        <button id="lockBtn" class="btn lock-btn" disabled>
            LOCK
        </button>

        <button id="unlockBtn" class="btn unlock-btn" disabled>
            UNLOCK
        </button>

    </section>

    <script src="src/app.js"></script>

</body>
</html>
